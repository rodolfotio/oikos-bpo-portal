<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oikos BPO — Portal</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg0:#09090e;--bg1:#111118;--bg2:#18181f;--bg3:#22222c;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.14);
  --t1:#eeedf5;--t2:#8e8da0;--t3:#4e4d60;
  --ac:#7c6ff7;--gr:#4ade80;--re:#f87171;--am:#fbbf24;--ac2:#4ecdc4;
  --r:12px;--rs:8px;
  font-family:'DM Sans',sans-serif;
}
html,body{height:100%;overflow:hidden}
body{background:var(--bg0);color:var(--t1)}

/* LOGIN */
.login-wrap{display:flex;align-items:center;justify-content:center;height:100%;padding:20px}
.login-box{background:var(--bg1);border:1px solid var(--border);border-radius:var(--r);padding:40px;width:100%;max-width:360px}
.login-logo{font-size:20px;font-weight:600;margin-bottom:6px}.login-logo span{color:var(--ac)}
.login-sub{font-size:12px;color:var(--t2);margin-bottom:32px}
.field{margin-bottom:16px}
.field label{display:block;font-size:11px;color:var(--t3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px}
.inp{width:100%;background:var(--bg2);border:1px solid var(--border);border-radius:var(--rs);padding:10px 12px;color:var(--t1);font-size:13px;font-family:'DM Sans',sans-serif;outline:none;transition:border .15s}
.inp:focus{border-color:var(--ac)}
.btn{width:100%;padding:11px;border-radius:var(--rs);border:none;background:var(--ac);color:#fff;font-size:13px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;transition:opacity .15s}
.btn:hover{opacity:.85}.btn:disabled{opacity:.5;cursor:not-allowed}
.err{font-size:12px;color:var(--re);margin-top:12px;display:none}

/* PORTAL SHELL */
.portal{display:none;flex-direction:column;height:100%}

/* TOPBAR */
.topbar{height:44px;min-height:44px;background:var(--bg1);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 16px;gap:12px;flex-shrink:0}
.tb-logo{font-size:13px;font-weight:600}.tb-logo span{color:var(--ac)}
.tb-sep{width:1px;height:16px;background:var(--border)}
.tb-nome{font-size:12px;font-weight:500;color:var(--t1)}
.tb-data{font-size:11px;color:var(--t3);font-family:'DM Mono',monospace}
.tb-sair{margin-left:auto;background:none;border:1px solid var(--border);border-radius:var(--rs);padding:5px 12px;color:var(--t2);font-size:11px;cursor:pointer;font-family:'DM Sans',sans-serif}
.tb-sair:hover{color:var(--t1)}

/* IFRAME */
.portal-frame{flex:1;border:none;width:100%;display:block;background:var(--bg0)}

/* LOADING */
.loading-wrap{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px}
.spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--ac);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-txt{font-size:13px;color:var(--t2)}
.load-err{font-size:13px;color:var(--re);text-align:center;max-width:320px;line-height:1.6}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login-wrap" id="login-wrap">
  <div class="login-box">
    <div class="login-logo">Oikos <span>BPO</span></div>
    <div class="login-sub">Portal do cliente</div>
    <div class="field">
      <label>E-mail</label>
      <input type="email" id="login-email" class="inp" placeholder="seu@email.com">
    </div>
    <div class="field">
      <label>Senha</label>
      <input type="password" id="login-senha" class="inp" placeholder="••••••••" onkeydown="if(event.key==='Enter')fazerLogin()">
    </div>
    <button class="btn" id="login-btn" onclick="fazerLogin()">Entrar</button>
    <div class="err" id="login-err"></div>
  </div>
</div>

<!-- PORTAL SHELL -->
<div class="portal" id="portal">
  <div class="topbar">
    <span class="tb-logo">Oikos <span>BPO</span></span>
    <div class="tb-sep"></div>
    <span class="tb-nome" id="tb-nome"></span>
    <span class="tb-data" id="tb-data"></span>
    <button class="tb-sair" onclick="logout()">Sair</button>
  </div>

  <div class="loading-wrap" id="loading-wrap">
    <div class="spinner"></div>
    <div class="loading-txt" id="loading-txt">Carregando seu painel...</div>
  </div>

  <iframe class="portal-frame" id="portal-frame" style="display:none" sandbox="allow-scripts allow-same-origin allow-forms allow-popups"></iframe>
</div>

<script>
const API_URL = 'https://oikos-bpo-backend-production.up.railway.app';
const SUPA_URL = 'https://hrnyqmyivwjhgzflanft.supabase.co';
const SUPA_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhybnlxbXlpdndqaGd6ZmxhbmZ0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5NzU5MzAsImV4cCI6MjA5MjU1MTkzMH0.UcuyrN14cGH0kAwP9EVPcub3s1JKtcHJN10zz_vHY1k';

let TOKEN = localStorage.getItem('oikos_token') || '';

// ── HELPERS ───────────────────────────────────────────────────────
function tokenValido(token) {
  try {
    const p = JSON.parse(atob(token.split('.')[1]));
    return p.exp * 1000 > Date.now();
  } catch { return false; }
}

function fmtDT(iso) {
  if (!iso) return null;
  const d = new Date(iso);
  const dd = String(d.getDate()).padStart(2,'0');
  const mm = String(d.getMonth()+1).padStart(2,'0');
  const yyyy = d.getFullYear();
  const hh = String(d.getHours()).padStart(2,'0');
  const mi = String(d.getMinutes()).padStart(2,'0');
  return `${dd}/${mm}/${yyyy} às ${hh}:${mi}`;
}

// ── AUTH ──────────────────────────────────────────────────────────
async function fazerLogin() {
  const email = document.getElementById('login-email').value.trim();
  const senha = document.getElementById('login-senha').value;
  const btn = document.getElementById('login-btn');
  const err = document.getElementById('login-err');
  err.style.display = 'none';
  btn.disabled = true;
  btn.textContent = 'Entrando...';

  try {
    const res = await fetch(`${SUPA_URL}/auth/v1/token?grant_type=password`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'apikey': SUPA_ANON },
      body: JSON.stringify({ email, password: senha })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error_description || 'E-mail ou senha incorretos.');
    TOKEN = data.access_token;
    localStorage.setItem('oikos_token', TOKEN);
    abrirPortal();
  } catch (e) {
    err.textContent = e.message;
    err.style.display = 'block';
  } finally {
    btn.disabled = false;
    btn.textContent = 'Entrar';
  }
}

function logout() {
  localStorage.removeItem('oikos_token');
  TOKEN = '';
  const frame = document.getElementById('portal-frame');
  frame.style.display = 'none';
  frame.src = 'about:blank';
  document.getElementById('portal').style.display = 'none';
  document.getElementById('login-wrap').style.display = 'flex';
}

// ── PORTAL ────────────────────────────────────────────────────────
function abrirPortal() {
  document.getElementById('login-wrap').style.display = 'none';
  document.getElementById('portal').style.display = 'flex';
  document.getElementById('loading-wrap').style.display = 'flex';
  document.getElementById('portal-frame').style.display = 'none';
  document.getElementById('loading-txt').textContent = 'Carregando seu painel...';
  document.getElementById('loading-txt').style.display = 'block';
  carregarPortal();
}

async function carregarPortal() {
  const headers = { 'Authorization': `Bearer ${TOKEN}` };

  try {
    const [resDados, resHtml] = await Promise.all([
      fetch(`${API_URL}/portal/dados`, { headers }),
      fetch(`${API_URL}/portal/html`, { headers }),
    ]);

    if (resDados.status === 401 || resHtml.status === 401) {
      logout();
      return;
    }

    if (!resDados.ok) throw new Error('Não foi possível carregar os dados.');
    if (!resHtml.ok) throw new Error('Nenhum painel cadastrado para este cliente. Entre em contato com a Oikos BPO.');

    const dados = await resDados.json();
    const html = await resHtml.text();

    const nomeCliente = dados.cliente?.nome || '';
    const ultimaAtu = dados.cliente?.ultima_atualizacao_html || dados.cliente?.ultima_atualizacao;
    const dataStr = fmtDT(ultimaAtu);

    document.getElementById('tb-nome').textContent = nomeCliente;
    document.getElementById('tb-data').textContent = dataStr ? `Dados de: ${dataStr}` : '';

    // Renderiza via blob URL — permite scripts e CDN externos no iframe
    const blob = new Blob([html], { type: 'text/html' });
    const blobUrl = URL.createObjectURL(blob);

    const frame = document.getElementById('portal-frame');
    frame.onload = () => {
      document.getElementById('loading-wrap').style.display = 'none';
      frame.style.display = 'block';
      URL.revokeObjectURL(blobUrl);
    };
    frame.src = blobUrl;

  } catch (e) {
    const wrap = document.getElementById('loading-wrap');
    wrap.innerHTML = `
      <div class="load-err">${e.message}</div>
      <button onclick="logout()" style="margin-top:12px;padding:8px 20px;border-radius:8px;border:1px solid rgba(255,255,255,0.1);background:none;color:#8e8da0;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:12px">Voltar ao login</button>`;
  }
}

// ── INICIALIZAÇÃO ─────────────────────────────────────────────────
if (TOKEN && tokenValido(TOKEN)) {
  abrirPortal();
} else if (TOKEN) {
  localStorage.removeItem('oikos_token');
  TOKEN = '';
}
</script>
</body>
</html>
